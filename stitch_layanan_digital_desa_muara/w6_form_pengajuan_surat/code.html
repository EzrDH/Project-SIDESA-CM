<style>

<body class="bg-surface antialiased pb-[100px]">
<!-- Top App Bar -->
<header class="bg-surface sticky top-0 w-full z-40 transition-colors flex items-center justify-between px-page-margin py-3">
<div class="flex items-center gap-sm">
<button class="p-2 -ml-2 rounded-full hover:bg-surface-container-low transition-colors text-on-surface-variant">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<h1 class="font-title-lg text-title-lg text-primary font-bold">Desa Cibeteung Muara</h1>
</div>
</header>
<main class="px-page-margin pt-6 max-w-2xl mx-auto">
<!-- Header Section -->
<div class="mb-gap-lg">
<h2 class="font-headline-md text-headline-md text-on-surface mb-2">Permohonan SKTM</h2>
<p class="font-body-lg text-body-lg text-on-surface-variant">Surat Keterangan Tidak Mampu (W6)</p>
</div>
<!-- Privacy Banner -->
<div class="bg-surface-container-low rounded-xl p-card-padding mb-gap-lg flex items-start gap-sm border border-outline-variant/50">
<span class="material-symbols-outlined text-secondary mt-0.5" style="font-variation-settings: 'FILL' 1;">shield_locked</span>
<div>
<p class="font-label-md text-label-md text-on-surface font-semibold">Keamanan Privasi</p>
<p class="font-body-lg text-body-lg text-on-surface-variant text-sm mt-1">Data pribadi Anda dibuktikan tanpa dibuka — privasi terlindungi.</p>
</div>
</div>
<!-- Form Section -->
<form class="space-y-gap-lg bg-surface-container-lowest rounded-xl p-card-padding border border-outline-variant/30 shadow-sm">
<!-- Keperluan -->
<div>
<label class="label-text" for="keperluan">Tujuan Pengajuan</label>
<div class="relative">
<select class="input-field appearance-none cursor-pointer" id="keperluan">
<option disabled="" selected="" value="">Pilih tujuan pengajuan SKTM</option>
<option value="pendidikan">Pendidikan (Beasiswa/Keringanan Biaya)</option>
<option value="kesehatan">Kesehatan (RS/BPJS)</option>
<option value="bantuan">Bantuan Sosial</option>
<option value="lainnya">Lainnya</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">expand_more</span>
</div>
</div>
<!-- Detail Keperluan -->
<div>
<label class="label-text" for="detail_keperluan">Detail Keperluan</label>
<textarea class="input-field resize-none py-3" id="detail_keperluan" placeholder="Jelaskan secara singkat rincian keperluan Anda..." rows="3"></textarea>
</div>
<!-- Attachment Upload (Optional) -->
<div>
<label class="label-text">Dokumen Pendukung (Opsional)</label>
<p class="font-caption-sm text-caption-sm text-on-surface-variant mb-3">Unggah foto KK, KTP, atau dokumen relevan lainnya jika ada.</p>
<div class="border-2 border-dashed border-outline-variant rounded-xl p-6 flex flex-col items-center justify-center bg-surface-container-lowest hover:bg-surface-container-low transition-colors cursor-pointer group">
<div class="bg-surface-container rounded-full p-3 mb-3 group-hover:bg-primary-container transition-colors">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-on-primary-container" style="font-variation-settings: 'FILL' 0;">upload_file</span>
</div>
<span class="font-label-md text-label-md text-primary font-semibold mb-1">Pilih File</span>
<span class="font-caption-sm text-caption-sm text-on-surface-variant">JPG, PNG, atau PDF (Max. 5MB)</span>
<input class="hidden" id="file-upload" type="file"/>
</div>
</div>
</form>
<!-- Submit Button Section -->
<div class="mt-gap-lg pt-4 pb-8">
<button class="w-full bg-primary text-on-primary font-label-md text-label-md font-bold py-4 px-6 rounded-[14px] hover:bg-surface-tint active:scale-[0.98] transition-all flex items-center justify-center gap-2 shadow-sm" style="min-height: 56px;" type="button">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">send</span>
                Kirim Permohonan
            </button>
</div>
</main>
<script>
        // Simple file upload interaction styling
        const dropzone = document.querySelector('.border-dashed');
        const fileInput = document.getElementById('file-upload');

        dropzone.addEventListener('click', () => {
            fileInput.click();
        });
        
        // Prevent default drag behaviors
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropzone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        // Highlight drop zone when item is dragged over it
        ['dragenter', 'dragover'].forEach(eventName => {
            dropzone.addEventListener(eventName, highlight, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropzone.addEventListener(eventName, unhighlight, false);
        });

        function highlight(e) {
            dropzone.classList.add('border-primary', 'bg-surface-container-low');
        }

        function unhighlight(e) {
            dropzone.classList.remove('border-primary', 'bg-surface-container-low');
        }
    </script>
